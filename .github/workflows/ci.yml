name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend deps
        working-directory: server
        run: npm install
      - name: Run tests
        working-directory: server
        run: npm test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: client
        run: npm install
      - name: Build
        working-directory: client
        run: npm run build
